harmony = "MatchBackness"
buffer  = "None"
min_stem_syllables = 1

[[suffix]]
label   = "VerbNoun"
class   = "VerbInflection"
surface = "mA"
forms   = ["me", "ma"]
harmony = "MatchBackness"
buffer  = "None"
min_stem_syllables = 1

[[suffix]]
label   = "PartFut"
