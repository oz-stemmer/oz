buffer  = "None"
min_stem_syllables = 1

[[suffix]]
label   = "Poss2sg"
class   = "NounInflection"
surface = "In"
forms   = ["ın", "in", "un", "ün"]
harmony = "MatchBackness"
buffer  = "None"
min_stem_syllables = 1

[[suffix]]
label   = "Poss3sg"
class   = "NounInflection"
