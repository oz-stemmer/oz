# Turkish verb inflectional suffixes
# DSL keys match noun-inflection.toml schema.

# ── Tense / aspect ────────────────────────────────────────────────────────────

[[suffix]]
label   = "Prog"
class   = "VerbInflection"
surface = "Iyor"
forms   = ["iyor", "ıyor", "uyor", "üyor"]
harmony = "Any"
buffer  = "None"
min_stem_syllables = 1

[[suffix]]
label   = "PastDef"
class   = "VerbInflection"
surface = "DI"
forms   = ["di", "dı", "du", "dü", "ti", "tı", "tu", "tü"]
harmony = "MatchBackness"
buffer  = "None"
min_stem_syllables = 1

[[suffix]]
label   = "PastEv"
class   = "VerbInflection"
surface = "mIş"
forms   = ["miş", "mış", "muş", "müş"]
harmony = "MatchBackness"
buffer  = "None"
min_stem_syllables = 1

[[suffix]]
label   = "AorPos"
class   = "VerbInflection"
surface = "Ir"
forms   = ["er", "ar", "ir", "ır", "ur", "ür"]
harmony = "MatchBackness"
buffer  = "None"
min_stem_syllables = 1

[[suffix]]
label   = "AorNeg"
class   = "VerbInflection"
surface = "mAz"
forms   = ["mez", "maz"]
harmony = "MatchBackness"
buffer  = "None"
min_stem_syllables = 1

[[suffix]]
label   = "Fut"
class   = "VerbInflection"
surface = "AcAk"
forms   = ["acak", "ecek"]
harmony = "MatchBackness"
buffer  = "None"
min_stem_syllables = 1

[[suffix]]
label   = "Cond"
class   = "VerbInflection"
surface = "sA"
forms   = ["sa", "se"]
harmony = "MatchBackness"
buffer  = "None"
min_stem_syllables = 1

[[suffix]]
label   = "Nec"
class   = "VerbInflection"
surface = "mAlI"
forms   = ["malı", "meli"]
harmony = "MatchBackness"
buffer  = "None"
min_stem_syllables = 1

# ── Negation ──────────────────────────────────────────────────────────────────

[[suffix]]
label   = "Neg"
class   = "VerbInflection"
surface = "mA"
forms   = ["me", "ma"]
harmony = "MatchBackness"
buffer  = "None"
min_stem_syllables = 1

